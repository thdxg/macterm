[tools]
gh = "latest"
swiftformat = "latest"
swiftlint = "latest"

[tasks.run]
description = "Run the app"
depends = ["check:fix"]
run = "scripts/run.sh"

[tasks.build]
description = "Build release app and DMG"
depends = ["check:fix"]
run = "scripts/build.sh"

[tasks.install]
description = "Install built app to /Applications"
depends = ["build"]
run = "scripts/install.sh"

[tasks.check]
description = "Format, lint, and build"
run = "scripts/check.sh"

[tasks."check:fix"]
description = "Auto-fix formatting and lint issues, then build"
run = "scripts/check-fix.sh"

[tasks.test]
description = "Run the test suite"
run = "swift test"

[tasks.format]
description = "Run swiftformat"
run = "swiftformat ."

[tasks.lint]
description = "Run swiftlint"
run = "swiftlint lint --strict --quiet"

[tasks.setup]
description = "Download GhosttyKit framework"
run = "scripts/setup.sh"

[tasks.clean]
description = "Clean build artifacts"
run = "swift package clean && rm -rf .build build"
