[tasks.run]
description = "Run the app (checks first)"
depends = ["check"]
run = "swift run Macterm"

[tasks.build]
description = "Build release app and DMG"
depends = ["check"]
run = """
#!/usr/bin/env bash
set -euo pipefail

PROJECT_ROOT="$PWD"
BUILD_DIR="$PROJECT_ROOT/build"
ARCH="${ARCH:-arm64}"
VERSION="${VERSION:-0.0.0}"
TRIPLE="${ARCH}-apple-macosx14.0"
BUILD_NUMBER=$(git -C "$PROJECT_ROOT" rev-list --count HEAD)
APP_BUNDLE="$BUILD_DIR/Macterm.app"
DMG_NAME="Macterm-${VERSION}-${ARCH}.dmg"

rm -rf "$APP_BUNDLE"
swift build -c release --triple "$TRIPLE"
SPM_BUILD_DIR=$(swift build -c release --triple "$TRIPLE" --show-bin-path)

mkdir -p "$APP_BUNDLE/Contents/MacOS" "$APP_BUNDLE/Contents/Resources"
cp "$SPM_BUILD_DIR/Macterm" "$APP_BUNDLE/Contents/MacOS/Macterm"
install_name_tool -add_rpath @executable_path/../Frameworks "$APP_BUNDLE/Contents/MacOS/Macterm"

if [[ -d "$SPM_BUILD_DIR/Macterm_Macterm.bundle" ]]; then
  cp -R "$SPM_BUILD_DIR/Macterm_Macterm.bundle" "$APP_BUNDLE/Contents/Resources/Macterm_Macterm.bundle"
fi

cp "$PROJECT_ROOT/Macterm/Info.plist" "$APP_BUNDLE/Contents/Info.plist"
/usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString $VERSION" "$APP_BUNDLE/Contents/Info.plist"
/usr/libexec/PlistBuddy -c "Set :CFBundleVersion $BUILD_NUMBER" "$APP_BUNDLE/Contents/Info.plist"

ICON_SOURCE="$PROJECT_ROOT/Macterm/Resources/Assets.xcassets/AppIcon.appiconset"
ICONSET_DIR=$(mktemp -d)/AppIcon.iconset
mkdir -p "$ICONSET_DIR"
cp "$ICON_SOURCE/icon_16.png" "$ICONSET_DIR/icon_16x16.png"
cp "$ICON_SOURCE/icon_16@2x.png" "$ICONSET_DIR/icon_16x16@2x.png"
cp "$ICON_SOURCE/icon_32.png" "$ICONSET_DIR/icon_32x32.png"
cp "$ICON_SOURCE/icon_32@2x.png" "$ICONSET_DIR/icon_32x32@2x.png"
cp "$ICON_SOURCE/icon_128.png" "$ICONSET_DIR/icon_128x128.png"
cp "$ICON_SOURCE/icon_128@2x.png" "$ICONSET_DIR/icon_128x128@2x.png"
cp "$ICON_SOURCE/icon_256.png" "$ICONSET_DIR/icon_256x256.png"
cp "$ICON_SOURCE/icon_256@2x.png" "$ICONSET_DIR/icon_256x256@2x.png"
cp "$ICON_SOURCE/icon_512.png" "$ICONSET_DIR/icon_512x512.png"
cp "$ICON_SOURCE/icon_512@2x.png" "$ICONSET_DIR/icon_512x512@2x.png"
iconutil -c icns "$ICONSET_DIR" -o "$APP_BUNDLE/Contents/Resources/AppIcon.icns"
rm -rf "$(dirname "$ICONSET_DIR")"

SPARKLE_FRAMEWORK="$PROJECT_ROOT/.build/artifacts/sparkle/Sparkle/Sparkle.xcframework/macos-arm64_x86_64/Sparkle.framework"
mkdir -p "$APP_BUNDLE/Contents/Frameworks"
cp -R "$SPARKLE_FRAMEWORK" "$APP_BUNDLE/Contents/Frameworks/Sparkle.framework"

SPARKLE_DIR="$APP_BUNDLE/Contents/Frameworks/Sparkle.framework"

codesign --force --sign - "$SPARKLE_DIR/Versions/B/XPCServices/Installer.xpc"
codesign --force --sign - "$SPARKLE_DIR/Versions/B/XPCServices/Downloader.xpc"
codesign --force --sign - "$SPARKLE_DIR/Versions/B/Updater.app"
codesign --force --sign - "$SPARKLE_DIR/Versions/B/Autoupdate"
codesign --force --sign - "$SPARKLE_DIR"
codesign --force --sign - "$APP_BUNDLE"

cd "$BUILD_DIR"
rm -f "$BUILD_DIR/$DMG_NAME"
hdiutil create -volname "Macterm" -srcfolder "$APP_BUNDLE" -ov -format UDZO "$BUILD_DIR/$DMG_NAME"
"""

[tasks.install]
description = "Install built app to /Applications"
depends = ["build"]
run = """
#!/usr/bin/env bash
set -euo pipefail

rm -rf /Applications/Macterm.app
ditto ./build/Macterm.app /Applications/Macterm.app
codesign --verify --deep --strict --verbose=2 /Applications/Macterm.app
"""

[tasks.check]
description = "Format, lint, and build"
run = """
#!/usr/bin/env bash
set -euo pipefail

swiftformat --lint .

if command -v swiftlint &>/dev/null; then
  swiftlint lint --strict --quiet
fi

swift build
"""

[tasks."check:fix"]
description = "Auto-fix formatting and lint issues, then build"
run = """
#!/usr/bin/env bash
set -euo pipefail

swiftformat .

if command -v swiftlint &>/dev/null; then
  swiftlint lint --fix --quiet || true
  swiftlint lint --strict --quiet
fi

swift build
"""

[tasks.format]
description = "Run swiftformat"
run = "swiftformat ."

[tasks.lint]
description = "Run swiftlint"
run = "swiftlint lint --strict --quiet"

[tasks.setup]
description = "Download GhosttyKit framework"
run = """
#!/usr/bin/env bash
set -euo pipefail

FORK_REPO="macterm-app/ghostty"
XCFRAMEWORK_DIR="GhosttyKit.xcframework"

if [[ -d "$XCFRAMEWORK_DIR" ]]; then
  exit 0
fi

LATEST_TAG=$(gh release list --repo "$FORK_REPO" --limit 1 --json tagName -q '.[0].tagName')
[[ -z "$LATEST_TAG" ]] && echo "Error: No releases found" && exit 1

gh release download "$LATEST_TAG" --pattern "GhosttyKit.xcframework.tar.gz" --repo "$FORK_REPO"
tar xzf GhosttyKit.xcframework.tar.gz
rm GhosttyKit.xcframework.tar.gz

cp "$XCFRAMEWORK_DIR/macos-arm64_x86_64/Headers/ghostty.h" "GhosttyKit/ghostty.h"
"""

[tasks.clean]
description = "Clean build artifacts"
run = "swift package clean && rm -rf .build build"
