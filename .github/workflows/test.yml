name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test
    runs-on: macos-26
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - uses: jdx/mise-action@v4

      - name: Setup GhosttyKit
        run: mise run ci:setup
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}

      - name: Test
        run: mise run ci:test
