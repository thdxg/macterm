name: Release

on:
  push:
    tags: ['v*']

jobs:
  build:
    runs-on: macos-26
    strategy:
      matrix:
        arch: [arm64, x86_64]
    permissions:
      contents: write
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: jdx/mise-action@v4

      - name: Setup GhosttyKit
        run: mise run ci:setup
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}

      - name: Build release artifact
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          if ! [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            VERSION="0.0.0"
          fi
          ARCH=${{ matrix.arch }} VERSION="$VERSION" mise run ci:build

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dmg-${{ matrix.arch }}
          path: build/*.dmg

  release:
    needs: build
    runs-on: macos-26
    permissions:
      contents: write
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v6

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dmgs
          merge-multiple: true

      - name: Create GitHub release
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          if ! [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            VERSION="0.0.0"
          fi
          TAG="v${VERSION}"
          gh release view "$TAG" >/dev/null 2>&1 || gh release create "$TAG" --title "Macterm $TAG" --generate-notes
          gh release upload "$TAG" dmgs/*.dmg --clobber
