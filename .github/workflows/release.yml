name: Release

on:
  push:
    tags: ['v*']

jobs:
  build:
    runs-on: macos-26
    permissions:
      contents: write
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: jdx/mise-action@v4

      - name: Setup GhosttyKit
        run: mise run ci:setup

      - name: Build universal release artifact
        env:
          SPARKLE_ED_PUBLIC_KEY: ${{ secrets.SPARKLE_ED_PUBLIC_KEY }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          if ! [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            VERSION="0.0.0"
          fi
          VERSION="$VERSION" mise run ci:build

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: dmg
          path: build/*.dmg

  release:
    needs: build
    runs-on: macos-26
    permissions:
      contents: write
      pages: write
      id-token: write
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    outputs:
      version: ${{ steps.release.outputs.version }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          path: dmgs
          merge-multiple: true

      - name: Publish GitHub release
        id: release
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          if ! [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            VERSION="0.0.0"
          fi
          TAG="v${VERSION}"
          gh release view "$TAG" >/dev/null 2>&1 || gh release create "$TAG" --title "Macterm $TAG" --generate-notes
          gh release upload "$TAG" dmgs/*.dmg --clobber
          # Ensure the release is published (not left as draft).
          gh release edit "$TAG" --draft=false
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      # ── Appcast generation ────────────────────────────────────────────
      # Sparkle's `sign_update` produces an EdDSA signature for each DMG.
      # We then append a new <item> to the appcast on the gh-pages branch,
      # which is served as https://thdxg.github.io/macterm/appcast.xml.

      - name: Install Sparkle tools
        run: |
          SPARKLE_VERSION="2.9.1"
          curl -fsSL "https://github.com/sparkle-project/Sparkle/releases/download/${SPARKLE_VERSION}/Sparkle-${SPARKLE_VERSION}.tar.xz" -o sparkle.tar.xz
          mkdir -p sparkle && tar -xf sparkle.tar.xz -C sparkle
          echo "$PWD/sparkle/bin" >> "$GITHUB_PATH"

      - name: Publish appcast to gh-pages
        env:
          SPARKLE_ED_PRIVATE_KEY: ${{ secrets.SPARKLE_ED_PRIVATE_KEY }}
          VERSION: ${{ steps.release.outputs.version }}
          TAG: ${{ steps.release.outputs.tag }}
        run: scripts/publish-appcast.sh dmgs

  bump-cask:
    needs: release
    runs-on: macos-26
    env:
      GH_TOKEN: ${{ secrets.HOMEBREW_TAP_PAT }}
      VERSION: ${{ needs.release.outputs.version }}
    steps:
      - name: Compute DMG sha256
        id: hash
        run: |
          URL="https://github.com/thdxg/macterm/releases/download/v${VERSION}/Macterm-${VERSION}.dmg"
          curl -fsSL "$URL" -o macterm.dmg
          echo "sha256=$(shasum -a 256 macterm.dmg | awk '{print $1}')" >> "$GITHUB_OUTPUT"

      - name: Checkout tap
        uses: actions/checkout@v6
        with:
          repository: thdxg/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_PAT }}
          path: tap

      - name: Bump cask
        working-directory: tap
        run: |
          sed -i '' -E "s/^( *version )\".*\"/\1\"${VERSION}\"/" Casks/macterm.rb
          sed -i '' -E "s/^( *sha256 )\".*\"/\1\"${{ steps.hash.outputs.sha256 }}\"/" Casks/macterm.rb
          if git diff --quiet Casks/macterm.rb; then
            echo "No changes — cask already at ${VERSION}."
            exit 0
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Casks/macterm.rb
          git commit -m "macterm ${VERSION}"
          git push origin HEAD:main
