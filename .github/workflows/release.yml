name: Release

on:
  push:
    branches: [main]

jobs:
  release:
    runs-on: macos-15
    permissions:
      contents: write
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: jdx/mise-action@v2

      - name: Setup GhosttyKit
        run: mise run setup
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}

      - name: Build release artifact
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          if ! [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            VERSION="0.0.0"
          fi
          ARCH=arm64 VERSION="$VERSION" mise run build

      - name: Create GitHub release
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          if ! [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            VERSION="0.0.0"
          fi
          DMG="build/Macterm-${VERSION}-arm64.dmg"
          TAG="v${VERSION}"
          gh release view "$TAG" >/dev/null 2>&1 || gh release create "$TAG" --title "Macterm $TAG" --generate-notes
          gh release upload "$TAG" "$DMG" --clobber
