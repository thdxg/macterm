name: Checks

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      swift: ${{ steps.filter.outputs.swift }}
    steps:
      - uses: actions/checkout@v7
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            swift:
              - "**/*.swift"
              - "project.yml"
              - "mise.toml"
              - "scripts/**"
              - ".swiftformat"
              - ".swiftlint.yml"
              - ".github/workflows/checks.yml"
              - "Macterm/Info.plist"
              - "Macterm/Macterm.entitlements"

  format:
    name: Format
    needs: changes
    if: needs.changes.outputs.swift == 'true'
    runs-on: macos-26
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - uses: jdx/mise-action@v4

      - name: Format
        run: mise run format --check --verbose

  lint:
    name: Lint
    needs: changes
    if: needs.changes.outputs.swift == 'true'
    runs-on: macos-26
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - uses: jdx/mise-action@v4

      - name: Lint
        run: mise run lint --verbose

  test:
    name: Test
    needs: changes
    if: needs.changes.outputs.swift == 'true'
    runs-on: macos-26
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - uses: jdx/mise-action@v4

      - name: Setup GhosttyKit
        run: mise run setup --verbose
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Test
        run: mise run test --verbose
