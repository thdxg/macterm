name: Checks

on:
  push:
    branches: [main]
    paths:
      - '**/*.swift'
      - 'project.yml'
      - 'mise.toml'
      - 'scripts/**'
      - '.swiftformat'
      - '.swiftlint.yml'
      - '.github/workflows/checks.yml'
      - 'Macterm/Info.plist'
      - 'Macterm/Macterm.entitlements'
  pull_request:
    branches: [main]
    paths:
      - '**/*.swift'
      - 'project.yml'
      - 'mise.toml'
      - 'scripts/**'
      - '.swiftformat'
      - '.swiftlint.yml'
      - '.github/workflows/checks.yml'
      - 'Macterm/Info.plist'
      - 'Macterm/Macterm.entitlements'

jobs:
  format:
    name: Format
    runs-on: macos-26
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - uses: jdx/mise-action@v4

      - name: Format
        run: mise run ci:format

  lint:
    name: Lint
    runs-on: macos-26
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - uses: jdx/mise-action@v4

      - name: Lint
        run: mise run ci:lint

  test:
    name: Test
    runs-on: macos-26
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - uses: jdx/mise-action@v4

      - name: Setup GhosttyKit
        run: mise run ci:setup
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}

      - name: Test
        run: mise run ci:test
