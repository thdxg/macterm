name: Checks

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  checks:
    name: Checks
    runs-on: macos-26
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - uses: jdx/mise-action@v4

      - name: Setup GhosttyKit
        run: mise run ci:setup
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}

      - name: Format
        run: mise run ci:format

      - name: Lint
        run: mise run ci:lint

      - name: Test
        run: mise run ci:test
